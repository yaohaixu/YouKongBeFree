<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>模块管理｜有空客厅</title>
    <meta name="description" content="YKadmin 添加、搜索、修改和删除活动模块。" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://youkong-d5gh4x0ayc29a2187.service.tcloudbase.com; form-action 'self'" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <script src="theme.js?v=0.17.3"></script>
    <link rel="stylesheet" href="styles.css?v=0.17.3" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到正文</a>
    <header class="site-header">
      <div class="nav-wrap">
        <a class="brand" href="index.html"><span class="brand-mark">有空</span><span class="brand-text">有空客厅</span></a>
        <button class="menu-toggle" type="button" aria-label="打开导航" aria-expanded="false"><span></span><span></span><span></span></button>
        <nav class="nav-links" aria-label="主导航">
          <a href="index.html">首页</a>
          <a href="whitepaper.html">社区共识</a>
          <a href="participate.html">活动与参与</a>
          <a href="donate.html">捐赠支持</a>
          <a href="about.html">关于与联系</a>
          <span class="session-nav" data-session-nav><a href="login.html">我的</a></span>
        </nav>
      </div>
    </header>

    <main id="main" data-admin-modules-page>
      <section class="page-hero">
        <div class="wrap">
          <p class="eyebrow">模块管理</p>
          <h1>活动属于哪些类别，在这里维护。</h1>
          <p>模块会出现在发起活动的下拉框里，也会作为活动列表里的分类标签。</p>
        </div>
      </section>

      <section class="section alt">
        <div class="wrap manager-layout">
          <div>
            <form class="filter-panel" data-module-filters>
              <label>搜索<input name="q" placeholder="模块名称 / 说明" /></label>
              <button class="button ghost" type="submit">筛选</button>
            </form>
            <div class="list-toolbar">
              <span data-module-count>正在读取模块...</span>
              <a class="button ghost" href="admin.html">回后台</a>
            </div>
            <div class="manage-list" data-module-list></div>
            <button class="button ghost load-more" type="button" data-load-more-modules hidden>加载更多</button>
          </div>

          <aside class="form-note sticky-panel">
            <h3>添加活动模块</h3>
            <form data-module-form>
              <label>模块名称<input name="name" required placeholder="比如：有空放映" /></label>
              <label>模块说明<input name="description" placeholder="一句话说明这个模块" /></label>
              <button class="button primary" type="submit">添加模块</button>
              <p class="form-message" data-module-message></p>
            </form>
          </aside>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-grid">
        <div><div class="footer-brand">有空客厅</div><div>模块让活动更容易被找到。</div><div class="credit">网站制作人：海旭</div></div>
        <nav class="footer-links"><a href="admin.html">后台</a><a href="admin-activities.html">全部活动</a><a href="admin-members.html">成员管理</a><a href="admin-templates.html">活动模板</a><a href="admin-logs.html">操作日志</a></nav>
      </div>
    </footer>
    <script src="script.js?v=0.17.3"></script>
    <script src="app.js?v=0.17.3"></script>
  </body>
</html>
