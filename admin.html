<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YKadmin 后台｜有空客厅</title>
    <meta name="description" content="YKadmin 管理成员手机号、昵称和活动模块。" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=0.4.1" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到正文</a>
    <header class="site-header">
      <div class="nav-wrap">
        <a class="brand" href="index.html"><span class="brand-mark">有空</span><span class="brand-text">有空客厅</span></a>
        <button class="menu-toggle" type="button" aria-label="打开导航" aria-expanded="false"><span></span><span></span><span></span></button>
        <nav class="nav-links" aria-label="主导航">
          <a href="index.html">首页</a>
          <a href="whitepaper.html">社区共识</a>
          <a href="participate.html">活动与参与</a>
          <a href="donate.html">捐赠支持</a>
          <a href="about.html">关于与联系</a>
          <span class="session-nav" data-session-nav><a href="login.html">我的</a></span>
        </nav>
      </div>
    </header>

    <main id="main" data-admin-root>
      <section class="page-hero">
        <div class="wrap">
          <p class="eyebrow">YKadmin 后台</p>
          <h1>管理谁可以发起活动，以及活动属于哪些模块。</h1>
          <p>新增成员后，对方用手机号即可登录。管理员也可以添加、修改、删除活动模块。</p>
        </div>
      </section>

      <section class="section">
        <div class="wrap">
          <div class="section-head compact-head">
            <div>
              <p class="section-kicker">待办任务</p>
              <h2>管理员审核。</h2>
            </div>
          </div>
          <div class="event-list rows" data-admin-pending></div>
        </div>
      </section>

      <section class="section alt">
        <div class="wrap admin-layout">
          <section class="form-note">
            <h3>添加成员</h3>
            <form data-user-form>
              <div class="form-grid">
                <label>昵称<input name="nickname" required /></label>
                <label>手机号<input name="phone" inputmode="tel" required /></label>
                <label>角色
                  <span class="check-group inline">
                    <label><input type="checkbox" name="roles" value="member" checked /> 成员</label>
                    <label><input type="checkbox" name="roles" value="collaborator" /> 协作员</label>
                  </span>
                </label>
              </div>
              <button class="button primary" type="submit">添加成员</button>
              <p class="form-message" data-user-message></p>
            </form>
          </section>

          <section class="form-note">
            <h3>添加活动模块</h3>
            <form data-module-form>
              <label>模块名称<input name="name" required placeholder="比如：有空放映" /></label>
              <label>模块说明<input name="description" placeholder="一句话说明这个模块" /></label>
              <button class="button primary" type="submit">添加模块</button>
              <p class="form-message" data-module-message></p>
            </form>
          </section>
        </div>
      </section>

      <section class="section alt">
        <div class="wrap">
          <div class="section-head compact-head">
            <div>
              <p class="section-kicker">全部活动</p>
              <h2>所有人、所有状态。</h2>
            </div>
          </div>
          <div class="event-list rows" data-all-activities></div>
        </div>
      </section>

      <section class="section">
        <div class="wrap admin-layout">
          <section>
            <div class="section-head compact-head">
              <div>
                <p class="section-kicker">成员管理</p>
                <h2>昵称、手机号和权限。</h2>
              </div>
            </div>
            <div class="manage-list" data-user-list></div>
          </section>

          <section>
            <div class="section-head compact-head">
              <div>
                <p class="section-kicker">模块管理</p>
                <h2>活动发布时的分类。</h2>
              </div>
            </div>
            <div class="manage-list" data-module-list></div>
          </section>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-grid">
        <div><div class="footer-brand">有空客厅</div><div>后台只做必要的维护工作。</div><div class="credit">网站制作人：海旭</div></div>
        <nav class="footer-links"><a href="index.html">首页</a><a href="me.html">我的</a><a href="participate.html">活动与参与</a></nav>
      </div>
    </footer>
    <script src="script.js?v=0.4.1"></script>
    <script src="app.js?v=0.4.1"></script>
  </body>
</html>
