  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>规则引擎｜有空客厅</title>
    <meta name="description" content="YKadmin 配置开放发布系统的规则引擎、限流和风险策略。" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://youkong-d5gh4x0ayc29a2187.service.tcloudbase.com https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; form-action 'self'" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <script src="theme.js?v=0.19.0"></script>
    <link rel="stylesheet" href="styles.css?v=0.19.0" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到正文</a>
    <header class="site-header">
      <div class="nav-wrap">
        <a class="brand" href="index.html"><span class="brand-mark">有空</span><span class="brand-text">有空客厅</span></a>
        <button class="menu-toggle" type="button" aria-label="打开导航" aria-expanded="false"><span></span><span></span><span></span></button>
        <nav class="nav-links" aria-label="主导航">
          <a href="index.html">首页</a>
          <a href="whitepaper.html">社区共识</a>
          <a href="participate.html">活动与参与</a>
          <a href="donate.html">捐赠支持</a>
          <a href="about.html">关于与联系</a>
          <span class="session-nav" data-session-nav><a href="me.html">我的</a></span>
        </nav>
      </div>
    </header>

    <main id="main" data-admin-safety-page>
      <section class="page-hero">
        <div class="wrap">
          <p class="eyebrow">Rule Engine</p>
          <h1>把开放发布的边界做成可调规则。</h1>
          <p>规则引擎只给出风险分，不直接删除内容。最终由策略、社区信用度和举报机制共同决定后续动作。</p>
        </div>
      </section>

      <section class="section alt">
        <div class="wrap manager-layout">
          <div>
            <div class="section-head compact-head">
              <div>
                <p class="section-kicker">规则列表</p>
                <h2>每条规则都是一个可替换节点。</h2>
              </div>
              <a class="button ghost" href="admin.html">回后台</a>
            </div>
            <div class="manage-list safety-rule-list" data-safety-rules>正在读取规则...</div>
          </div>

          <aside class="form-note sticky-panel">
            <h3>新增规则</h3>
            <form data-safety-rule-form>
              <label>规则名称<input name="name" required placeholder="比如：营销词密度检测" /></label>
              <label>规则类型<input name="type" required placeholder="自定义 type" /></label>
              <label>风险分值<input name="weight" type="number" min="-100" max="100" value="10" required /></label>
              <label>是否启用<select name="enabled"><option value="true">启用</option><option value="false">关闭</option></select></label>
              <label>规则说明<textarea name="description" placeholder="这条规则判断什么"></textarea></label>
              <label>参数 JSON<textarea name="params" placeholder='{"terms":["示例"]}'>{}</textarea></label>
              <button class="button primary" type="submit">新增规则</button>
            </form>
            <p class="form-message" data-safety-message></p>
          </aside>
        </div>
      </section>

      <section class="section">
        <div class="wrap">
          <form class="form-note config-editor" data-safety-config-form>
            <h3>策略配置</h3>
            <label>完整配置 JSON<textarea name="config" rows="18" spellcheck="false"></textarea></label>
            <button class="button primary" type="submit">保存策略配置</button>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-grid">
        <div><div class="footer-brand">有空客厅</div><div>开放优先，但边界需要能被社区看见和调整。</div><div class="credit">网站制作人：海旭</div></div>
        <nav class="footer-links"><a href="admin.html">后台</a><a href="admin-ai.html">AI 分析</a><a href="admin-trust.html">社区信用度</a><a href="admin-logs.html">操作日志</a></nav>
      </div>
    </footer>
    <script src="script.js?v=0.19.0"></script>
    <script src="app.js?v=0.19.0"></script>
  </body>
</html>
