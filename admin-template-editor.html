<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>编辑活动模板｜有空客厅</title>
    <meta name="description" content="YKadmin 新增或编辑有空客厅活动描述模板。" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://youkong-d5gh4x0ayc29a2187.service.tcloudbase.com; form-action 'self'" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <script src="theme.js?v=0.16.2"></script>
    <link rel="stylesheet" href="styles.css?v=0.16.2" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到正文</a>
    <header class="site-header">
      <div class="nav-wrap">
        <a class="brand" href="index.html"><span class="brand-mark">有空</span><span class="brand-text">有空客厅</span></a>
        <button class="menu-toggle" type="button" aria-label="打开导航" aria-expanded="false"><span></span><span></span><span></span></button>
        <nav class="nav-links" aria-label="主导航">
          <a href="index.html">首页</a>
          <a href="whitepaper.html">社区共识</a>
          <a href="participate.html">活动与参与</a>
          <a href="donate.html">捐赠支持</a>
          <a href="about.html">关于与联系</a>
          <span class="session-nav" data-session-nav><a href="login.html">我的</a></span>
        </nav>
      </div>
    </header>

    <main id="main" data-admin-template-editor-page>
      <section class="page-hero">
        <div class="wrap">
          <p class="eyebrow">模板详情</p>
          <h1 data-template-editor-heading>新增活动模板。</h1>
          <p>模板只作为活动描述的底稿。保存后，成员在发起活动页选择模板即可套用正文。</p>
        </div>
      </section>

      <section class="section alt">
        <div class="wrap editor-layout template-editor-layout">
          <form class="form-note template-form-panel" data-template-form>
            <h3 data-template-form-title>新增活动模板</h3>
            <div class="form-grid compact-form-grid">
              <label>模板名称<input name="name" required placeholder="比如：有空放映默认介绍" /></label>
              <label>模板说明<input name="description" placeholder="一句话说明适用场景" /></label>
            </div>
            <label>模板内容</label>
            <textarea name="content" class="rich-textarea" data-rich-textarea required placeholder="写下模板正文。可以包含一级标题、段落、列表和正文图片。"></textarea>
            <div class="form-actions">
              <button class="button primary" type="submit" data-template-submit>保存模板</button>
              <a class="button outline" href="admin-templates.html">取消</a>
            </div>
            <p class="form-message" data-template-message></p>
          </form>

          <aside class="panel-block sticky-panel">
            <p class="section-kicker">写作提示</p>
            <h3>把模板写成可以被改写的底稿。</h3>
            <p class="muted-text">建议保留活动缘起、流程、适合谁来、注意事项几个段落。正文图片会通过稳定链接展示在审核和公开活动页。</p>
            <div class="button-row">
              <a class="button ghost" href="admin-templates.html">模板列表</a>
              <a class="button outline" href="admin.html">回后台</a>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-grid">
        <div><div class="footer-brand">有空客厅</div><div>把重复的开头收起来，把每次活动的新鲜留出来。</div><div class="credit">网站制作人：海旭</div></div>
        <nav class="footer-links"><a href="admin.html">后台</a><a href="admin-templates.html">活动模板</a><a href="admin-activities.html">全部活动</a><a href="admin-logs.html">操作日志</a></nav>
      </div>
    </footer>
    <script src="script.js?v=0.16.2"></script>
    <script src="assets/js/rich-editor.js?v=0.16.2"></script>
    <script src="app.js?v=0.16.2"></script>
  </body>
</html>
