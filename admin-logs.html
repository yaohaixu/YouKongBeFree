<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>操作日志｜有空客厅</title>
    <meta name="description" content="YKadmin 查看有空客厅系统操作日志。" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://youkong-d5gh4x0ayc29a2187.service.tcloudbase.com; form-action 'self'" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <script src="theme.js?v=0.16.3"></script>
    <link rel="stylesheet" href="styles.css?v=0.16.3" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到正文</a>
    <header class="site-header">
      <div class="nav-wrap">
        <a class="brand" href="index.html"><span class="brand-mark">有空</span><span class="brand-text">有空客厅</span></a>
        <button class="menu-toggle" type="button" aria-label="打开导航" aria-expanded="false"><span></span><span></span><span></span></button>
        <nav class="nav-links" aria-label="主导航">
          <a href="index.html">首页</a>
          <a href="whitepaper.html">社区共识</a>
          <a href="participate.html">活动与参与</a>
          <a href="donate.html">捐赠支持</a>
          <a href="about.html">关于与联系</a>
          <span class="session-nav" data-session-nav><a href="login.html">我的</a></span>
        </nav>
      </div>
    </header>

    <main id="main" data-admin-logs-page>
      <section class="page-hero">
        <div class="wrap">
          <p class="eyebrow">操作日志</p>
          <h1>系统里的关键动作都在这里。</h1>
          <p>新增、保存、删除、提交、审核、退回、撤回、报名、取消报名等操作会按时间倒序记录。</p>
        </div>
      </section>

      <section class="section alt">
        <div class="wrap">
          <form class="filter-panel wide log-filter-panel" data-log-filters>
            <label>搜索<input name="q" placeholder="操作 / 人员 / 手机号 / 活动 / 模块" /></label>
            <label>操作类型<select name="action" data-log-action-filter></select></label>
            <label>操作人<select name="actorId" data-log-actor-filter></select></label>
            <label>角色<select name="actorRole">
              <option value="">全部角色</option>
              <option value="admin">管理员</option>
              <option value="collaborator">协作员</option>
              <option value="member">成员</option>
              <option value="guest">访客</option>
              <option value="system">系统</option>
            </select></label>
            <label>开始日期<input name="from" type="date" /></label>
            <label>结束日期<input name="to" type="date" /></label>
            <button class="button ghost" type="submit">筛选</button>
          </form>
          <div class="list-toolbar">
            <span data-log-count>正在读取日志...</span>
            <a class="button ghost" href="admin.html">回后台</a>
          </div>
          <div class="event-list rows" data-log-list></div>
          <button class="button ghost load-more" type="button" data-load-more-logs hidden>加载更多</button>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-grid">
        <div><div class="footer-brand">有空客厅</div><div>透明一点，协作就更稳一点。</div><div class="credit">网站制作人：海旭</div></div>
        <nav class="footer-links"><a href="admin.html">后台</a><a href="admin-activities.html">全部活动</a><a href="admin-members.html">成员管理</a><a href="admin-templates.html">活动模板</a></nav>
      </div>
    </footer>
    <script src="script.js?v=0.16.3"></script>
    <script src="app.js?v=0.16.3"></script>
  </body>
</html>
