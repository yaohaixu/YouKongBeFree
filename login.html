    <main id="main">
      <section class="page-hero">
        <div class="wrap">
          <p class="eyebrow">管理员 / 协作员入口</p>
          <h1>用手机号进入社区治理后台。</h1>
          <p>普通访客无需登录即可发起活动。这里留给管理员和协作员处理兜底复核、配置和社区治理。</p>
        </div>
      </section>

      <section class="section alt">
        <div class="wrap auth-layout">
          <form class="form-note auth-card" data-login-form>
            <h3>登录</h3>
            <label for="phone">手机号</label>
            <input id="phone" name="phone" inputmode="tel" autocomplete="tel" placeholder="请输入被添加过的手机号" required />
            <button class="button primary" type="submit">进入有空</button>
            <p class="form-message" data-login-message>请输入已被管理员加入协作名单的手机号。</p>
          </form>
          <div class="text-stack">
            <p class="section-kicker">说明</p>
            <h2>开放发起，治理权限另行管理。</h2>
            <p>如果你需要参与复核、规则配置或后台维护，请先联系有空管理员添加你的昵称和手机号。</p>
            <p>登录后，你会进入工作台，再选择处理审核待办或进入后台配置。</p>
          </div>
        </div>
      </section>
