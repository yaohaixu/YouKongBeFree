    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <script src="theme.js?v=0.17.4"></script>
    <link rel="stylesheet" href="styles.css?v=0.17.4" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到正文</a>
    <header class="site-header">
      <div class="nav-wrap">
        <a class="brand" href="index.html"><span class="brand-mark">有空</span><span class="brand-text">有空客厅</span></a>
        <button class="menu-toggle" type="button" aria-label="打开导航" aria-expanded="false"><span></span><span></span><span></span></button>
        <nav class="nav-links" aria-label="主导航">
          <a href="index.html">首页</a>
          <a href="whitepaper.html">社区共识</a>
          <a href="participate.html">活动与参与</a>
          <a href="donate.html">捐赠支持</a>
          <a href="about.html">关于与联系</a>
          <span class="session-nav" data-session-nav><a href="login.html">我的</a></span>
        </nav>
      </div>
    </header>

    <main id="main" data-my-activities-page>
      <section class="page-hero">
        <div class="wrap">
          <p class="eyebrow">我的活动</p>
          <h1>看清每个活动现在到哪一步了。</h1>
          <p>筛选草稿、审核中、退回、已发布等状态，也可以查看报名表、撤回或继续编辑。</p>
        </div>
      </section>

      <section class="section alt">
        <div class="wrap">
          <div>
            <form class="filter-panel" data-my-activity-filters>
              <label>搜索<input name="q" placeholder="标题 / 发起人 / 地点 / 协作员" /></label>
              <label>状态<select name="status"></select></label>
              <label>开始日期<input name="from" type="date" /></label>
              <label>结束日期<input name="to" type="date" /></label>
              <label>排序
                <select name="sort">
                  <option value="created-desc">最近创建</option>
                  <option value="start-asc">活动时间从近到远</option>
                  <option value="start-desc">活动时间从远到近</option>
                  <option value="registrations-desc">报名人数最多</option>
                </select>
              </label>
              <button class="button ghost" type="submit">筛选</button>
            </form>
            <div class="list-toolbar">
              <span data-my-activity-count>正在读取活动...</span>
              <a class="button primary" href="activity-editor.html">发起活动</a>
            </div>
            <div class="event-list rows" data-my-activities></div>
            <button class="button ghost load-more" type="button" data-load-more-my-activities hidden>加载更多</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-grid">
        <div><div class="footer-brand">有空客厅</div><div>自己的活动从这里集中处理。</div><div class="credit">网站制作人：海旭</div></div>
        <nav class="footer-links"><a href="me.html">工作台</a><a href="activity-editor.html">发起活动</a><a href="review-tasks.html">审核待办</a></nav>
      </div>
    </footer>
    <script src="script.js?v=0.17.4"></script>
    <script src="app.js?v=0.17.4"></script>
  </body>
</html>
